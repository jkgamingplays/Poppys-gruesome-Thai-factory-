<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poppy's Gruesome Toy Factory</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; user-select: none; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; touch-action: none;
        }

        #game-viewport {
            width: 100%; height: 100%;
            position: relative;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        /* Video Filter Overlay */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 500; opacity: 0.5;
        }

        /* HUD - Inspired by your date format */
        .hud {
            position: absolute; top: 15px; left: 15px;
            color: #0f0; font-size: 11px; z-index: 100; font-family: monospace;
            text-shadow: 0 0 5px #0f0;
        }

        /* Menu System */
        #menu {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        h1 { color: #b30000; font-size: 2.8rem; text-align: center; text-shadow: 0 0 25px #f00; margin-bottom: 50px;}
        .start-btn {
            padding: 20px 60px; background: #b30000; color: white; border: 4px solid white;
            border-radius: 50px; font-weight: bold; font-size: 1.4rem; cursor: pointer;
            box-shadow: 0 0 30px rgba(179, 0, 0, 0.7); transition: transform 0.1s;
        }
        .start-btn:active { transform: scale(0.95); }

        /* Mobile Controls UI - Based on Roblox screenshot */
        .controls-layer {
            position: absolute; bottom: 30px; width: 100%;
            display: none; justify-content: space-between; align-items: center;
            padding: 0 25px; z-index: 1000;
        }
        .btn-circle {
            width: 75px; height: 75px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.4);
            display: flex; justify-content: center; align-items: center; font-weight: bold;
            font-size: 18px; text-transform: uppercase;
        }
        .btn-l { background: rgba(0, 85, 255, 0.6); color: #fff; box-shadow: 0 0 15px #0055ff; }
        .btn-r { background: rgba(138, 43, 226, 0.6); color: #fff; box-shadow: 0 0 15px #8a2be2; }
        
        /* THE SWAP BUTTON - CENTRAL */
        #btn-swap {
            width: 60px; height: 60px; border: 3px solid #ffcc00;
            background: rgba(255, 204, 0, 0.3); color: #ffcc00; font-size: 12px;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
        }

        /* Visual Hands Models */
        .hand-model {
            position: absolute; bottom: -25px; width: 150px; height: 150px;
            transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28); display: none; z-index: 50;
        }
        #hand-l { left: 0; transform: translateY(200px); }
        #hand-r { right: 0; transform: translateY(200px); }
        .hand-active { transform: translateY(-50px) !important; }
        
        /* SVG definitions for the hands */
        .hand-svg { width: 100%; height: 100%; filter: drop-shadow(0 0 10px #000); }
    </style>
</head>
<body>

<div class="overlay"></div>

<div id="game-viewport">
    <div class="hud" id="hud-text">LIVE_FEED: SECTOR_04<br>10 APR 2026<br>GRABPACK: v.1.0 (LOADED)</div>

    <div id="menu">
        <h1>POPPY'S<br>GRUESOME<br>FACTORY</h1>
        <div class="start-btn" onclick="startGame()">START SHIFT</div>
        <p style="color:#444; margin-top:20px; font-size: 10px;">BETA_INPUT_FIX - v.1.0.8</p>
    </div>

    <div id="hand-l" class="hand-model">
        <svg class="hand-svg" viewBox="0 0 100 100"><rect width="85" height="85" x="7.5" y="7.5" rx="15" fill="#0055ff" stroke="#fff" stroke-width="4"/></svg>
    </div>
    <div id="hand-r" class="hand-model">
        <svg class="hand-svg" viewBox="0 0 100 100"><rect width="85" height="85" x="7.5" y="7.5" rx="15" fill="#8a2be2" stroke="#fff" stroke-width="4"/></svg>
    </div>

    <div class="controls-layer" id="ui-layer">
        <div class="btn-circle btn-l" id="ctrl-l">L</div>
        <div class="btn-circle" id="btn-swap">SWAP</div>
        <div class="btn-circle btn-r" id="ctrl-r">R</div>
    </div>
</div>

<script>
    let audioCtx;
    const menu = document.getElementById('menu');
    const controls = document.getElementById('ui-layer');
    const handL = document.getElementById('hand-l');
    const handR = document.getElementById('hand-r');
    const swapBtn = document.getElementById('btn-swap');
    
    // Tracks current hand colors: default L=Blue, R=Purple
    let handState = { l: 'blue', r: 'purple' };

    function startGame() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        menu.style.display = 'none';
        controls.style.display = 'flex';
        handL.style.display = 'block';
        handR.style.display = 'block';
        
        playAmbientHum();
        if (navigator.vibrate) navigator.vibrate(100);
    }

    // Audio & Vibration feedback
    function playClunk(freq) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.type = 'square';
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function playAmbientHum() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = 55;
        gain.gain.value = 0.02;
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start();
    }

    // Grab Mechanism
    function fireHand(side) {
        const visual = document.getElementById('hand-' + side);
        visual.classList.add('hand-active');
        
        playClunk(side === 'l' ? 140 : 180);
        if (navigator.vibrate) navigator.vibrate(35);
        
        setTimeout(() => visual.classList.remove('hand-active'), 250);
    }

    // THE HAND SWAP FEATURE
    function performSwap() {
        // Toggle colors in state
        const oldL = handState.l;
        handState.l = handState.r;
        handState.r = oldL;

        // Colors to hex
        const colors = { blue: '#0055ff', purple: '#8a2be2' };

        // Update visual hand SVGs
        document.querySelector('#hand-l rect').setAttribute('fill', colors[handState.l]);
        document.querySelector('#hand-r rect').setAttribute('fill', colors[handState.r]);

        // Update control button styles
        const ctrlL = document.getElementById('ctrl-l');
        const ctrlR = document.getElementById('ctrl-r');
        
        ctrlL.style.background = `rgba(${oldL === 'blue' ? '138, 43, 226' : '0, 85, 255'}, 0.6)`;
        ctrlL.style.boxShadow = `0 0 15px ${oldL === 'blue' ? '#8a2be2' : '#0055ff'}`;
        
        ctrlR.style.background = `rgba(${oldL === 'blue' ? '0, 85, 255' : '138, 43, 226'}, 0.6)`;
        ctrlR.style.boxShadow = `0 0 15px ${oldL === 'blue' ? '#0055ff' : '#8a2be2'}`;

        playClunk(300); // Higher tone for the swap event
        if (navigator.vibrate) navigator.vibrate([30, 20, 30]);
        console.log(`Swapped! L is now ${handState.l}, R is now ${handState.r}`);
    }

    // Touch Event Listeners
    document.getElementById('ctrl-l').addEventListener('touchstart', (e) => { e.preventDefault(); fireHand('l'); });
    document.getElementById('ctrl-r').addEventListener('touchstart', (e) => { e.preventDefault(); fireHand('r'); });
    swapBtn.addEventListener('touchstart', (e) => { e.preventDefault(); performSwap(); });
    
    // PC Clicks
    document.getElementById('ctrl-l').addEventListener('mousedown', () => fireHand('l'));
    document.getElementById('ctrl-r').addEventListener('mousedown', () => fireHand('r'));
    swapBtn.addEventListener('mousedown', performSwap);

    // Stop accidental zooming
    document.addEventListener('touchmove', (e) => { if(e.touches.length > 1) e.preventDefault(); }, { passive: false });
</script>

</body>
</html>
